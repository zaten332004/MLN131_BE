version: '3.8'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mln131_sql_server_prod
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    networks:
      - mln131_network
    volumes:
      - mln131_sql_data_prod:/var/opt/mssql
      - mln131_sql_logs:/var/opt/mssql/log
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "(/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" >/dev/null 2>&1) || (/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -Q \"SELECT 1\" >/dev/null 2>&1)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s

  backend:
    image: ${REGISTRY:-mln131}/${IMAGE_NAME:-mln131-backend}:${IMAGE_TAG:-latest}
    container_name: mln131_backend_prod
    depends_on:
      sql-server:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=sql-server;Database=MLN131;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true;Connection Timeout=30;
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: MLN131
      Jwt__Audience: MLN131
      Jwt__AccessTokenMinutes: 120
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL:-}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD:-}
    networks:
      - mln131_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: mln131_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mln131_network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mln131_network:
    driver: bridge

volumes:
  mln131_sql_data_prod:
  mln131_sql_logs:
