services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mln131_sql_server_prod
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    networks:
      - mln131_network
    volumes:
      - mln131_sql_data_prod:/var/opt/mssql
      - mln131_sql_logs:/var/opt/mssql/log
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'cat < /dev/null > /dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s

  sql-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: mln131_sql_init_prod
    depends_on:
      sql-server:
        condition: service_healthy
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      DB_USER: ${DB_USER:-mln131}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
    networks:
      - mln131_network
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      SQLCMD_BIN=$$(command -v /opt/mssql-tools18/bin/sqlcmd >/dev/null 2>&1 && echo /opt/mssql-tools18/bin/sqlcmd || echo /opt/mssql-tools/bin/sqlcmd);
      $$SQLCMD_BIN -S sql-server -U sa -P "$$SA_PASSWORD" -v DB_USER="$$DB_USER" -v DB_PASSWORD="$$DB_PASSWORD" -Q "
      IF DB_ID(N'MLN131') IS NULL BEGIN CREATE DATABASE [MLN131]; END;
      IF NOT EXISTS (SELECT 1 FROM sys.sql_logins WHERE name = N'$(DB_USER)')
        BEGIN
          DECLARE @sql nvarchar(max) =
            N'CREATE LOGIN [' + REPLACE(N'$(DB_USER)', ']', ']]') + N'] WITH PASSWORD = ''' + REPLACE(N'$(DB_PASSWORD)', '''', '''''') + N''', CHECK_POLICY = OFF, CHECK_EXPIRATION = OFF;';
          EXEC(@sql);
        END;
      USE [MLN131];
      IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'$(DB_USER)')
        BEGIN
          DECLARE @sql2 nvarchar(max) =
            N'CREATE USER [' + REPLACE(N'$(DB_USER)', ']', ']]') + N'] FOR LOGIN [' + REPLACE(N'$(DB_USER)', ']', ']]') + N'];';
          EXEC(@sql2);
        END;
      EXEC sp_addrolemember N'db_owner', N'$(DB_USER)';
      "

  backend:
    image: ${REGISTRY:-mln131}/${IMAGE_NAME:-mln131-backend}:${IMAGE_TAG:-latest}
    container_name: mln131_backend_prod
    depends_on:
      sql-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Server=sql-server;Database=MLN131;User Id=${DB_USER:-mln131};Password=${DB_PASSWORD:-12345};TrustServerCertificate=True;MultipleActiveResultSets=true;Connection Timeout=30;
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: MLN131
      Jwt__Audience: MLN131
      Jwt__AccessTokenMinutes: 120
      Gemini__ApiKey: ${GEMINI_API_KEY:-}
      SeedAdmin__Email: ${SEED_ADMIN_EMAIL:-}
      SeedAdmin__Password: ${SEED_ADMIN_PASSWORD:-}
    networks:
      - mln131_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: mln131_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mln131_network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  mln131_network:
    driver: bridge

volumes:
  mln131_sql_data_prod:
  mln131_sql_logs:
